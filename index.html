<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A premium mobile-first Hindu wedding invitation for Navin Reddy S and Teja Shree A."
    />
    <title>Navin Reddy & Teja Shree | Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        const isLocalDevHost =
          window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";

        if (isLocalDevHost) {
          return;
        }

        const alreadyBundledEntry = document.querySelector(
          'script[type="module"][src*="/assets/app.js"]'
        );

        if (alreadyBundledEntry) {
          return;
        }

        const css = document.createElement("link");
        css.rel = "stylesheet";
        css.href = "/teju-Navin/assets/style.css";
        document.head.appendChild(css);

        const script = document.createElement("script");
        script.type = "module";
        script.src = "/teju-Navin/assets/app.js";
        document.head.appendChild(script);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
